<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faculty Dashboard — Campus Solutions</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <nav class="navbar">
    <div class="navbar-brand">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/>
      </svg>
      {{ current_user.name }}
      <span class="badge badge-role">Faculty</span>
    </div>
    <a href="/logout" class="btn-logout">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="15" height="15" fill="currentColor">
        <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5-5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
      </svg>
      Logout
    </a>
  </nav>

  <div class="container">

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert alert-success">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}

    <div class="grid-3">

      <!-- POST NOTICE -->
      <div class="card">
        <div class="card-title">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
          </svg>
          Post Notice
        </div>
        <form method="POST">
          <input type="hidden" name="action" value="notice">
          <div class="form-group">
            <input type="text" name="title" placeholder="Notice title" required>
          </div>
          <div class="form-group">
            <textarea name="content" placeholder="Notice content" required></textarea>
          </div>
          <button class="btn btn-warning" type="submit">Post Notice</button>
        </form>
      </div>

      <!-- POST ASSIGNMENT -->
      <div class="card">
        <div class="card-title">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/>
          </svg>
          Post Assignment
        </div>
        <form method="POST">
          <input type="hidden" name="action" value="assignment">
          <div class="form-group">
            <input type="text" name="title" placeholder="Assignment title" required>
          </div>
          <div class="form-group">
            <textarea name="description" placeholder="Assignment description" required></textarea>
          </div>
          <button class="btn btn-info" type="submit">Post Assignment</button>
        </form>
      </div>

      <!-- MARK ATTENDANCE -->
      <div class="card">
        <div class="card-title">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>
          </svg>
          Mark Attendance
        </div>
        <form method="POST">
          <input type="hidden" name="action" value="attendance">
          <div class="form-group">
            <select name="student_id" required>
              <option value="" disabled selected>Select student</option>
              {% for s in students %}
                <option value="{{ s.id }}">{{ s.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="form-group">
            <select name="status" required>
              <option value="Present">Present</option>
              <option value="Absent">Absent</option>
            </select>
          </div>
          <button class="btn btn-success" type="submit">Mark Attendance</button>
        </form>
      </div>

    </div>
  </div>

</body>
</html>
