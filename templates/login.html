<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Solutions — Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">

      <h2>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="28" height="28" fill="#7c83fd">
          <path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/>
        </svg>
        Campus Solutions
      </h2>
      <p class="subtitle">Team Codex — HackArena 2K26</p>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="alert alert-danger">{{ messages[0] }}</div>
        {% endif %}
      {% endwith %}

      <form method="POST">
        <div class="form-group">
          <input
            type="text"
            name="username"
            placeholder="Username"
            required
            autocomplete="off"
          >
        </div>
        <div class="form-group">
          <input
            type="password"
            name="password"
            placeholder="Password"
            required
          >
        </div>
        <button class="btn btn-primary" type="submit">
          Login
        </button>
      </form>

      <p class="demo-hint">
        student1/pass &nbsp;|&nbsp; faculty1/pass &nbsp;|&nbsp; admin1/pass
      </p>

    </div>
  </div>
</body>
</html>
